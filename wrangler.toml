name = "finance-agent"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "finance-knowledge"

[[durable_objects.bindings]]
name = "FinanceAgent"
class_name = "FinanceAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FinanceAgent"]

[vars]
ENVIRONMENT = "production"
